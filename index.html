<html>
<head>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://gftruj.github.io/webzamples/aframe/controls/oculus-thumbstick-controls.js"></script>

  <script src="random-map.js"></script>
  <script src="custom-objects.js"></script>
  <script src="build-maze.js"></script>

  <script>
    let MAP = randomMap(5, 10, 10, 3);

    const GAME = {
      timeLeft: -1,
      cellSize: [4, 4],
      statusText: ['GAME OVER', 'WELL DONE', 'LEVEL:', 'TIME:'],
      textColors: ['firebrick', 'goldenrod', 'white', 'white']
    };
  </script>

  <script src="game-logic.js"></script>

  <script>
    AFRAME.registerComponent('cheese-game', {
      init: function () {
        this.score = 0;
        this.totalCheese = 6;
        this.gameOver = false;
        this.cheeses = [];

        setTimeout(() => {
          this.startCheeseGame();
        }, 1500);
      },

      startCheeseGame: function () {
        const rig = document.querySelector('#rig');
        const camera = document.querySelector('a-camera');

        if (!rig || !camera) {
          setTimeout(() => this.startCheeseGame(), 500);
          return;
        }

        this.createScoreText(camera);
        this.createCheeseNearPlayer(rig);
        this.createMouseNearPlayer(rig);
      },

      createScoreText: function (camera) {
        this.scoreText = document.createElement('a-text');
        this.scoreText.setAttribute('value', 'CHEESE: 0 / ' + this.totalCheese);
        this.scoreText.setAttribute('position', '0 -0.28 -1');
        this.scoreText.setAttribute('align', 'center');
        this.scoreText.setAttribute('width', '1.8');
        this.scoreText.setAttribute('color', 'yellow');

        camera.appendChild(this.scoreText);
      },

      createCheeseNearPlayer: function (rig) {
        const scene = this.el;
        const p = rig.object3D.position;

        const positions = [
          { x: p.x + 0,  y: 1.2, z: p.z - 4 },
          { x: p.x + 3,  y: 1.2, z: p.z - 4 },
          { x: p.x - 3,  y: 1.2, z: p.z - 4 },
          { x: p.x + 0,  y: 1.2, z: p.z - 8 },
          { x: p.x + 3,  y: 1.2, z: p.z - 8 },
          { x: p.x - 3,  y: 1.2, z: p.z - 8 }
        ];

        positions.forEach((pos, index) => {
          const cheese = document.createElement('a-entity');

          cheese.setAttribute('id', 'cheese-' + index);
          cheese.setAttribute('position', pos.x + ' ' + pos.y + ' ' + pos.z);
          cheese.setAttribute('rotation', '0 45 0');

          cheese.setAttribute('geometry', {
            primitive: 'box',
            width: 0.8,
            height: 0.35,
            depth: 0.8
          });

          cheese.setAttribute('material', {
            color: '#FFD700',
            emissive: '#FFCC00',
            emissiveIntensity: 0.5
          });

          cheese.setAttribute('animation', {
            property: 'rotation',
            to: '0 405 0',
            loop: true,
            dur: 2500,
            easing: 'linear'
          });

          scene.appendChild(cheese);
          this.cheeses.push(cheese);
        });
      },

      createMouseNearPlayer: function (rig) {
        const scene = this.el;
        const p = rig.object3D.position;

        this.mouse = document.createElement('a-entity');
        this.mouse.setAttribute('position', (p.x + 0) + ' 0.8 ' + (p.z - 12));

        const body = document.createElement('a-sphere');
        body.setAttribute('radius', '0.6');
        body.setAttribute('color', 'gray');

        const ear1 = document.createElement('a-sphere');
        ear1.setAttribute('radius', '0.18');
        ear1.setAttribute('position', '-0.35 0.45 -0.15');
        ear1.setAttribute('color', 'pink');

        const ear2 = document.createElement('a-sphere');
        ear2.setAttribute('radius', '0.18');
        ear2.setAttribute('position', '0.35 0.45 -0.15');
        ear2.setAttribute('color', 'pink');

        const nose = document.createElement('a-sphere');
        nose.setAttribute('radius', '0.12');
        nose.setAttribute('position', '0 0 -0.6');
        nose.setAttribute('color', 'black');

        this.mouse.appendChild(body);
        this.mouse.appendChild(ear1);
        this.mouse.appendChild(ear2);
        this.mouse.appendChild(nose);

        scene.appendChild(this.mouse);
      },

      tick: function () {
        if (this.gameOver) return;

        const rig = document.querySelector('#rig');
        if (!rig || !this.mouse) return;

        const playerPos = rig.object3D.position;

        this.checkCheese(playerPos);
        this.moveMouse(playerPos);
        this.checkMouse(playerPos);
      },

      checkCheese: function (playerPos) {
        this.cheeses.forEach((cheese) => {
          if (!cheese.parentNode) return;

          const cheesePos = cheese.object3D.position;
          const distance = playerPos.distanceTo(cheesePos);

          if (distance < 1.6) {
            cheese.parentNode.removeChild(cheese);
            this.score++;

            this.scoreText.setAttribute(
              'value',
              'CHEESE: ' + this.score + ' / ' + this.totalCheese
            );

            if (this.score === this.totalCheese) {
              this.winGame();
            }
          }
        });
      },

      moveMouse: function (playerPos) {
        const mousePos = this.mouse.object3D.position;

        const direction = new THREE.Vector3()
          .subVectors(playerPos, mousePos)
          .normalize();

        mousePos.x += direction.x * 0.015;
        mousePos.z += direction.z * 0.015;
      },

      checkMouse: function (playerPos) {
        const mousePos = this.mouse.object3D.position;
        const distance = playerPos.distanceTo(mousePos);

        if (distance < 1.2) {
          this.gameOver = true;
          this.scoreText.setAttribute('value', 'GAME OVER! THE MOUSE CAUGHT YOU!');
          this.scoreText.setAttribute('color', 'red');
        }
      },

      winGame: function () {
        this.gameOver = true;
        this.scoreText.setAttribute('value', 'YOU WIN! ALL CHEESE COLLECTED!');
        this.scoreText.setAttribute('color', 'lime');
      }
    });
  </script>
</head>

<body>
  <a-scene background="color: skyblue" game-logic cheese-game>

    <a-light type="ambient" intensity="0.4"></a-light>
    <a-light type="directional" position="100 100 100" intensity="0.5"></a-light>

    <a-entity id="maze"></a-entity>

    <a-entity id="rig">
      <a-camera>
        <a-text id="floor" position="0 0.007 -0.01" align="center" width="0.015" font="monoid"></a-text>
        <a-text id="message" value="" position="0 0 -0.01" align="center" width="0.05" font="monoid"></a-text>
      </a-camera>

      <a-entity oculus-touch-controls="hand: right" oculus-thumbstick-controls></a-entity>
    </a-entity>

    <a-sound id="fall" src="maze_mixkit-falling-on-foil-748.wav"></a-sound>

  </a-scene>
</body>
</html>
